<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ClawHeart - Agent Safety Layer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        try {
          var t = localStorage.getItem('clawheart-theme');
          if (t === 'dark' || (t !== 'light' && typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches))
            document.documentElement.classList.add('dark');
          else
            document.documentElement.classList.remove('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
